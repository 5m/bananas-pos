name: Release

on:
  push:
    branches:
      - main
    paths:
      - internal/meta/meta.go
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: bananas-pos

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.tag.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^var Version = "\(.*\)"$/\1/p' internal/meta/meta.go)"
          if [[ -z "$version" ]]; then
            echo "Version not found in internal/meta/meta.go" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *a* || "$version" == *b* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether release tag already exists
        id: tag
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: bananas-pos-linux-amd64
            archive_suffix: linux-amd64.tar.gz
            make_target: package-linux
          - os: macos-15
            label: macOS
            artifact_name: bananas-pos-macos
            archive_suffix: macos-arm64.tar.gz
            make_target: package-macos
          - os: windows-latest
            label: Windows
            artifact_name: bananas-pos-windows-amd64
            archive_suffix: windows-amd64.zip
            make_target: package-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Install Windows resource tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: go install github.com/akavel/rsrc@latest

      - name: Build package
        if: runner.os != 'Windows'
        run: make ${{ matrix.make_target }}

      - name: Build package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\msys64\usr\bin\make.exe" "${{ matrix.make_target }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.BINARY_NAME }}-${{ needs.prepare-release.outputs.version }}-${{ matrix.archive_suffix }}
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build
    if: needs.prepare-release.outputs.should_release == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Flatten artifact directory
        run: |
          mkdir -p release-files
          find release-assets -type f -maxdepth 2 -exec mv {} release-files/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: v${{ needs.prepare-release.outputs.version }}
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          body: |
            Automated release for version `${{ needs.prepare-release.outputs.version }}` from `main`.
          files: release-files/*
          overwrite_files: true
